name: CI Pipeline

on:
  push:
    branches:

  pull_request:
    branches:
      - main
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run app
        run: node app.js
